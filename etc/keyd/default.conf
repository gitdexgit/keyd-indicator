[global]

# set 300ms of oneshot() before it fades. If you don't hit keys before 300ms, oneshot() doesn't function.
oneshot_timeout = 300

## Explaing how this works: This means to apply the overload() you must hold the key at least for 190ms. Prevents accednetal firing shorts
# For safety, Change default overload() timeout of overloadt when not specefied.
overload_tap_timeout = 190




# For testing puproses. Do not use daily yet.
# macro_timeout = 100

# For testing puproses. Do not use daily yet.
# macro_timeout = 80















