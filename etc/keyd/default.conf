####
#### .ctrl/shift/meta Enablers and Enhancers
####


# leftshift enablers.
# these shifts are mostly enhancers but you know they also enabme - and @ to be _ and ^ but
# mostly everything else just shift and saves time with one taps
leftshift = overload(shift,oneshot(shift))
rightshift = overload(shift,oneshot(shift))


# Keep alt function but make leftalt an enabler
# Enabler: get more than 10 workspaces and switch between them compfortablly (in case I need more workspaces).
leftalt = overload(alt,oneshot(move_to_desktops))

# Keep meta function but make leftmeta an enabler.
# Enabler: Switch between frequently known window classes. Tap then hit key(ex: tap+g for gimp or tap+b for btop).
#          The window names has to match for the sake of memorizing less. Just memorize the name of the program.
leftmeta = overload(meta,oneshot(activate_windows))


# Enhancer: No need to keep hold. just tap and hit for control for flow OR hold control.
leftcontrol = overload(control,oneshot(control))

# Miscs. This is some tiny openning file exploer in certain locations like recent and some tiny QoL things
# Enabler: Open frequently opened directories on a File manager for convenence.
escape = overload(miscs, escape)



















